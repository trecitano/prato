networks:
  default:
    name: prato-test

services:
  prato-test-postgres:
    image: postgres:18.2-alpine3.22
    container_name: "prato-postgres"
    environment:
      POSTGRES_DB: prato_test
      POSTGRES_USER: prato
      POSTGRES_PASSWORD: prato
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  prato-test-mysql:
    image: mysql:9.6.0
    container_name: "prato-mysql"
    environment:
      MYSQL_DATABASE: prato_test
      MYSQL_USER: prato
      MYSQL_PASSWORD: prato
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "53306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

